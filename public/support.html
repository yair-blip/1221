<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>פורטל שירות Bartec</title>
    <style>
        :root { --primary: #004a99; --bg: #f4f7f9; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border-top: 6px solid var(--primary); text-align: center; }
        .logo { max-width: 180px; margin-bottom: 20px; }
        h1 { font-size: 1.5rem; color: #333; margin-bottom: 20px; }
        .field { text-align: right; margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 1rem; box-sizing: border-box; }
        textarea { height: 100px; resize: none; }
        button { width: 100%; background: var(--primary); color: white; border: none; padding: 12px; border-radius: 6px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:hover { background: #003366; }
        #res { margin-top: 15px; font-weight: bold; display: none; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="card">
        <img src="logo.png" class="logo" alt="Bartec">
        <h1>קריאת שירות חדשה</h1>
        <form id="f">
            <div class="field"><label>שם מלא</label><input type="text" id="n" required></div>
            <div class="field"><label>טלפון</label><input type="tel" id="p" required></div>
            <div class="field">
                <label>סניף</label>
                <select id="b" required>
                    <option value="מרכז">מרכז</option>
                    <option value="צפון">צפון</option>
                    <option value="דרום">דרום</option>
                </select>
            </div>
            <div class="field"><label>תיאור התקלה</label><textarea id="i" required></textarea></div>
            <button type="submit" id="s">שלח קריאה</button>
        </form>
        <div id="res"></div>
    </div>
    <script>
        document.getElementById('f').onsubmit = async (e) => {
            e.preventDefault();
            const b = document.getElementById('s');
            const r = document.getElementById('res');
            b.disabled = true; b.textContent = 'שולח...';
            try {
                const ipR = await fetch('https://api.ipify.org?format=json');
                const ipD = await ipR.json();
                const res = await fetch('/api/portal/submit', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        name: document.getElementById('n').value,
                        phone: document.getElementById('p').value,
                        branch: document.getElementById('b').value,
                        issue: document.getElementById('i').value,
                        metadata: { ip: ipD.ip }
                    })
                });
                if(res.ok) {
                    r.style.display = 'block'; r.style.background = '#e6ffed'; r.style.color = '#22863a';
                    r.textContent = 'הקריאה נשלחה בהצלחה!';
                    e.target.reset();
                } else { throw new Error(); }
            } catch {
                r.style.display = 'block'; r.style.background = '#ffeef0'; r.style.color = '#cb2431';
                r.textContent = 'שגיאה בשליחה. נסה שוב.';
            } finally { b.disabled = false; b.textContent = 'שלח קריאה'; }
        };
    </script>
</body>
</html>

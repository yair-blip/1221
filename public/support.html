<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>בר-טק - פתיחת קריאת שירות</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 500px; }
        h2 { color: #0056b3; text-align: center; margin-bottom: 25px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        textarea { height: 100px; resize: none; }
        button { width: 100%; padding: 12px; background-color: #0056b3; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; transition: background 0.3s; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }
        .status { margin-top: 15px; padding: 10px; border-radius: 4px; display: none; text-align: center; }
        .success { background-color: #d4edda; color: #155724; display: block; }
        .error { background-color: #f8d7da; color: #721c24; display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>פתיחת קריאת שירות</h2>
    <form id="supportForm">
        <div class="form-group"><label>שם מלא:</label><input type="text" id="name" required></div>
        <div class="form-group"><label>שם חברה:</label><input type="text" id="company" required></div>
        <div class="form-group"><label>אימייל:</label><input type="email" id="email" required></div>
        <div class="form-group"><label>טלפון:</label><input type="tel" id="phone" required></div>
        <div class="form-group"><label>תיאור התקלה:</label><textarea id="subject" required></textarea></div>
        <button type="submit" id="submitBtn">שלח קריאה</button>
    </form>
    <div id="statusMsg" class="status"></div>
</div>

<script>
    document.getElementById('supportForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('statusMsg');
        
        btn.disabled = true;
        msg.style.display = 'none';

        // איסוף נתונים
        const payload = {
            name: document.getElementById('name').value,
            company: document.getElementById('company').value,
            email: document.getElementById('email').value,
            phone: document.getElementById('phone').value,
            subject: document.getElementById('subject').value,
            os: navigator.userAgentData?.platform || navigator.platform,
            screenRes: `${window.screen.width}x${window.screen.height}`,
            language: navigator.language
        };

        try {
            const response = await fetch('/webhooks/form', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                msg.textContent = 'הפנייה התקבלה בהצלחה!';
                msg.className = 'status success';
                document.getElementById('supportForm').reset();
            } else {
                throw new Error();
            }
        } catch (err) {
            msg.textContent = 'שגיאה בשליחה. נסה שוב מאוחר יותר.';
            msg.className = 'status error';
        } finally {
            msg.style.display = 'block';
            btn.disabled = false;
        }
    });
</script>

</body>
</html>

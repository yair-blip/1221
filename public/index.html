<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BarTech - פורטל קריאות שירות</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1e40af;
            --bg: #f8fafc;
            --card: #ffffff;
            --text: #1e293b;
        }
        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header h1 {
            color: var(--primary);
            margin: 0;
            font-size: 1.8rem;
        }
        .header p {
            color: #64748b;
            margin-top: 0.5rem;
        }
        .form-group {
            margin-bottom: 1.25rem;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        input, select, textarea {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            box-sizing: border-box;
            font-family: inherit;
            font-size: 1rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        button {
            width: 100%;
            padding: 1rem;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: var(--primary-dark);
        }
        #status {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: 0.5rem;
            display: none;
            text-align: center;
        }
        .success { background: #dcfce7; color: #166534; display: block !important; }
        .error { background: #fee2e2; color: #991b1b; display: block !important; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>BarTech AI</h1>
            <p>מרכז תמיכה וקריאות שירות</p>
        </div>
        <form id="supportForm">
            <div class="form-group">
                <label>שם מלא</label>
                <input type="text" id="name" required placeholder="ישראל ישראלי">
            </div>
            <div class="form-group">
                <label>אימייל לעדכונים</label>
                <input type="email" id="email" required placeholder="name@company.com">
            </div>
            <div class="form-group">
                <label>מספר טלפון</label>
                <input type="tel" id="phone" required placeholder="050-0000000">
            </div>
            <div class="form-group">
                <label>סניף</label>
                <select id="branch">
                    <option value="ראשי">סניף ראשי</option>
                    <option value="צפון">סניף צפון</option>
                    <option value="דרום">סניף דרום</option>
                </select>
            </div>
            <div class="form-group">
                <label>תיאור התקלה</label>
                <textarea id="issue" rows="4" required placeholder="פרט כאן את מהות הפנייה..."></textarea>
            </div>
            <button type="submit" id="submitBtn">שלח קריאת שירות</button>
        </form>
        <div id="status"></div>
    </div>

    <script>
        document.getElementById('supportForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const status = document.getElementById('status');
            
            btn.disabled = true;
            btn.innerText = 'שולח...';
            
            const data = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value,
                phone: document.getElementById('phone').value,
                branch: document.getElementById('branch').value,
                issue: document.getElementById('issue').value
            };

            try {
                const res = await fetch('/api/portal/submit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    status.innerText = 'הקריאה נשלחה בהצלחה! נציג יחזור אליך בהקדם.';
                    status.className = 'success';
                    document.getElementById('supportForm').reset();
                } else {
                    throw new Error();
                }
            } catch (err) {
                status.innerText = 'שגיאה בשליחה. אנא נסה שנית או פנה טלפונית.';
                status.className = 'error';
            } finally {
                btn.disabled = false;
                btn.innerText = 'שלח קריאת שירות';
            }
        };
    </script>
</body>
</html>
